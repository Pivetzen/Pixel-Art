<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Pixel Art - Google Sheets DB</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.description {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            outline: none;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 9px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            background: #fff;
            padding: 8px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .legend-item.active {
            border-color: var(--primary-color);
            background-color: #ebf5ff;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.2);
        }

        .color-box {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .grid-wrapper {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding: 10px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-top: 10px;
        }

        #pixelGrid {
            display: grid;
            background-color: #fff;
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
        }

        .cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #7f8c8d;
            user-select: none;
            box-sizing: border-box;
            background-color: #ffffff;
            cursor: cell;
        }

        #hiddenCanvas {
            display: none;
        }

        @media print {
            body { background: #fff; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .controls, button { display: none !important; }
            .legend-item { border-color: #e2e8f0 !important; background: #fff !important; box-shadow: none !important; }
            .grid-wrapper { border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Pixel Art</h1>
    <p class="description">As opções de artes abaixo são carregadas em tempo real direto de uma planilha do Google Sheets!</p>

    <div class="controls">
        <div class="control-group">
            <label for="gridSize">Dimensão:</label>
            <select id="gridSize" onchange="generateGrid()">
                <option value="12">12 x 12</option>
                <option value="24" selected>24 x 24</option>
                <option value="36">36 x 36</option>
                <option value="48">48 x 48</option>
                <option value="60">60 x 60</option>
                <option value="72">72 x 72</option>
            </select>
        </div>

        <div class="control-group">
            <label for="artType">Arte Base:</label>
            <select id="artType" onchange="generateGrid()">
                <option value="">Carregando artes...</option>
            </select>
        </div>

        <button onclick="resetPainting()">Limpar Pintura</button>
    </div>

    <div class="legend" id="colorLegend"></div>

    <div class="grid-wrapper">
        <div id="pixelGrid"></div>
    </div>
</div>

<canvas id="hiddenCanvas"></canvas>

<script>
    // 1. INSIRA O ID DA SUA PLANILHA DO GOOGLE SHEETS AQUI:
    const SPREADSHEET_ID = '1tKYP8mNXeND0o0xziEc-faBVXUjSQFq-c-k2YuFFopk';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

    // Paleta de segurança estável para conversão de imagens base do Sheets
    const imageDefaultPalette = [
        { code: '0', name: 'Fundo Claro', color: '#ffffff' },
        { code: '1', name: 'Preto / Escuro', color: '#1a1a1a' },
        { code: '2', name: 'Vermelho', color: '#e74c3c' },
        { code: '3', name: 'Azul', color: '#3498db' },
        { code: '4', name: 'Verde', color: '#2ecc71' },
        { code: '5', name: 'Amarelo', color: '#f1c40f' },
        { code: '6', name: 'Laranja', color: '#e67e22' },
        { code: '7', name: 'Roxo', color: '#9b59b6' },
        { code: '8', name: 'Cinza', color: '#95a5a6' },
        { code: '9', name: 'Rosa / Tom Pele', color: '#f39c12' }
    ];

    let selectedColorCode = ''; 
    let selectedColorHex = '';

    // Carrega a base de dados assim que a página abre
    async function loadSheetsDatabase() {
        const select = document.getElementById('artType');
        
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // Faz o parse simples das linhas do CSV
            const rows = csvText.split('\n').map(row => {
                // Remove aspas que o Google coloca automaticamente
                return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1').trim());
            });

            select.innerHTML = '';
            
            // Ignora a primeira linha (cabeçalho) e preenche o select com as linhas válidas
            let validOptionsCount = 0;
            for (let i = 1; i < rows.length; i++) {
                const [nomeArte, urlImagem] = rows[i];
                if (nomeArte && urlImagem) {
                    const option = document.createElement('option');
                    option.value = urlImagem;
                    option.textContent = nomeArte;
                    select.appendChild(option);
                    validOptionsCount++;
                }
            }

            if (validOptionsCount === 0) {
                select.innerHTML = '<option value="">Nenhuma arte cadastrada</option>';
            } else {
                generateGrid(); // Gera o primeiro gráfico após popular
            }

        } catch (error) {
            console.error("Erro ao acessar a planilha: ", error);
            select.innerHTML = '<option value="">Erro ao carregar dados do Sheets</option>';
        }
    }

    function selectColor(code, hex, element) {
        selectedColorCode = code;
        selectedColorHex = hex;
        document.querySelectorAll('.legend-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }

    function getClosestPaletteColor(r, g, b) {
        let minDistance = Infinity;
        let closest = imageDefaultPalette[0];

        imageDefaultPalette.forEach(item => {
            const hex = item.color.replace('#', '');
            const pr = parseInt(hex.substring(0, 2), 16);
            const pg = parseInt(hex.substring(2, 4), 16);
            const pb = parseInt(hex.substring(4, 6), 16);

            const distance = Math.sqrt((r - pr) ** 2 + (g - pg) ** 2 + (b - pb) ** 2);
            if (distance < minDistance) {
                minDistance = distance;
                closest = item;
            }
        });
        return closest;
    }

    function generateGrid() {
        const urlImagem = document.getElementById('artType').value;
        if (!urlImagem) return;

        const grid = document.getElementById('pixelGrid');
        const size = parseInt(document.getElementById('gridSize').value);
        const colorLegend = document.getElementById('colorLegend');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');

        const img = new Image();
        img.crossOrigin = "Anonymous"; 
        img.src = urlImagem;

        img.onload = function() {
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(img, 0, 0, size, size);

            const imgData = ctx.getImageData(0, 0, size, size).data;

            colorLegend.innerHTML = '';
            imageDefaultPalette.forEach((item, index) => {
                const legendItem = document.createElement('div');
                legendItem.classList.add('legend-item');
                if (index === 0) legendItem.classList.add('active');
                legendItem.onclick = () => selectColor(item.code, item.color, legendItem);

                const colorBox = document.createElement('div');
                colorBox.style.backgroundColor = item.color;
                colorBox.classList.add('color-box');

                legendItem.appendChild(colorBox);
                legendItem.append(`${item.code} = ${item.name}`);
                colorLegend.appendChild(legendItem);

                if (index === 0) {
                    selectedColorCode = item.code;
                    selectedColorHex = item.color;
                }
            });

            grid.innerHTML = '';
            let cellSize = 28;
            if (size > 24) cellSize = 22;
            if (size > 36) cellSize = 16;
            if (size > 48) cellSize = 12;
            if (size > 60) cellSize = 10;

            grid.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
            grid.style.gridTemplateRows = `repeat(${size}, ${cellSize}px)`;

            let dataIndex = 0;
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    const r = imgData[dataIndex];
                    const g = imgData[dataIndex + 1];
                    const b = imgData[dataIndex + 2];
                    const a = imgData[dataIndex + 3];

                    let matched = imageDefaultPalette[0];
                    if (a >= 50) {
                        matched = getClosestPaletteColor(r, g, b);
                    }

                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    cell.style.fontSize = `${cellSize * 0.5}px`;
                    cell.textContent = matched.code;

                    cell.onclick = () => {
                        cell.style.backgroundColor = selectedColorHex;
                        if (selectedColorCode === '1' || selectedColorCode === '7') {
                            cell.style.color = '#fff';
                        } else {
                            cell.style.color = '#7f8c8d';
                        }
                    };

                    grid.appendChild(cell);
                    dataIndex += 4;
                }
            }
        };

        img.onerror = function() {
            grid.innerHTML = `<div style="padding: 20px; color: red; font-weight: bold;">Erro ao carregar ou processar o link da imagem da planilha. Certifique-se de usar URLs diretas e públicas (terminadas em .png ou .jpg).</div>`;
        };
    }

    function resetPainting() {
        document.querySelectorAll('.cell').forEach(cell => {
            cell.style.backgroundColor = '#ffffff';
            cell.style.color = '#7f8c8d';
        });
    }

    window.onload = loadSheetsDatabase;
</script>

</body>
</html>
